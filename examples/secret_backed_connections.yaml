suite:
  name: Secret-backed SQLite Validation

connections:
  sqlite_local:
    uri:
      from: env
      key: QUALINK_SQLITE_URI

data_sources:
  - name: users_source
    connection: sqlite_local
    table: users
    table_name: users

checks:
  - name: Users Quality
    level: error
    rules:
      - has_size:
          gt: 0
      - is_complete: user_id
      - is_complete: email
